<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>더콜링카페 & 베이킹클래스 모바일 명함</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600&family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Noto Sans KR', sans-serif;
            background-color: #f3f4f6;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
        }

        .font-montserrat {
            font-family: 'Montserrat', sans-serif;
        }

        .perspective {
            perspective: 1000px;
        }

        .preserve-3d {
            transform-style: preserve-3d;
        }

        .backface-hidden {
            backface-visibility: hidden;
        }

        .rotate-y-180 {
            transform: rotateY(180deg);
        }

        /* 텍스처 효과 */
        .card-texture {
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)' opacity='0.05'/%3E%3C/svg%3E");
        }
    </style>
</head>
<body class="bg-stone-200">

    <!-- Card Wrapper -->
    <div class="relative w-full max-w-sm px-4 perspective cursor-pointer" onclick="toggleCard(event)" id="cardWrapper">

        <!-- Card Container -->
        <div id="cardInner" class="relative w-full h-[200px] sm:h-[215px] preserve-3d transition-transform duration-700 ease-in-out shadow-2xl rounded-2xl">

            <!-- 명함 앞면 (Front) -->
            <div class="absolute inset-0 w-full h-full bg-[#4a3525] rounded-2xl backface-hidden flex flex-col justify-center items-center border border-[#3a291c] card-texture shadow-inner">
                <!-- 안쪽 테두리 (여백 강조) -->
                <div class="absolute inset-2.5 sm:inset-3 border border-white/20 rounded-xl pointer-events-none"></div>

                <!-- Logo -->
                <div class="text-center font-montserrat text-white z-10 px-4">
                    <h1 class="text-2xl sm:text-3xl tracking-[0.12em] font-light flex items-baseline justify-center whitespace-nowrap">
                        THE C<span class="text-[0.85em] relative top-[1px] font-medium mx-[1px]">△</span>LLING
                    </h1>
                    <h2 class="text-lg sm:text-xl tracking-[0.22em] font-light mt-1.5 flex items-baseline justify-center">
                        C<span class="text-[0.85em] relative top-[0px] font-medium mx-[1px]">△</span>FE
                    </h2>
                </div>
                <div class="w-10 h-[1px] bg-[#a68a77] my-3.5 z-10"></div>
                <p class="text-[#d4c3b3] font-montserrat tracking-[0.3em] text-[11px] sm:text-xs font-light z-10">
                    BAKING CLASS
                </p>
            </div>

            <!-- 명함 뒷면 (Back) -->
            <div class="absolute inset-0 w-full h-full bg-[#fcfbf9] rounded-2xl backface-hidden rotate-y-180 px-7 py-5 sm:px-8 flex flex-col gap-3.5 border border-stone-200 card-texture shadow-inner">
                <!-- 안쪽 테두리 (여백 강조) -->
                <div class="absolute inset-2.5 sm:inset-3 border border-stone-200/80 rounded-xl pointer-events-none"></div>

                <!-- 상단: 이름 + 전화번호 -->
                <div class="z-10">
                    <div class="flex items-baseline gap-5 flex-wrap">
                        <h2 class="text-2xl font-bold text-zinc-900 tracking-tight">김현아</h2>
                        <a href="tel:010-3423-9059" data-extlink class="text-lg sm:text-xl font-normal text-[#4a3525] hover:text-[#2f2117] transition-colors tracking-tight relative z-20" style="touch-action: manipulation;">
                            010-3423-9059
                        </a>
                    </div>
                    <div class="mt-1.5 flex items-center gap-2 flex-wrap text-xs sm:text-sm text-stone-500 font-medium tracking-wide">
                        <span>베이킹 클래스 강사</span>
                        <a href="https://www.instagram.com/cafe_calling_/" rel="noopener noreferrer" data-extlink class="inline-flex items-center gap-1 hover:opacity-80 transition-opacity relative z-20" style="touch-action: manipulation;">
                            <span class="w-5 h-5 rounded-md flex items-center justify-center" style="background: linear-gradient(45deg, #f09433 0%, #e6683c 25%, #dc2743 50%, #cc2366 75%, #bc1888 100%);">
                                <svg class="w-3.5 h-3.5 text-white" fill="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                                    <path d="M12 2.163c3.204 0 3.584.012 4.85.07 3.252.148 4.771 1.691 4.919 4.919.058 1.265.069 1.645.069 4.849 0 3.205-.012 3.584-.069 4.849-.149 3.225-1.664 4.771-4.919 4.919-1.266.058-1.644.07-4.85.07-3.204 0-3.584-.012-4.849-.07-3.26-.149-4.771-1.699-4.919-4.92-.058-1.265-.07-1.644-.07-4.849 0-3.204.013-3.583.07-4.849.149-3.227 1.664-4.771 4.919-4.919 1.266-.057 1.645-.069 4.849-.069zM12 0C8.741 0 8.333.014 7.053.072 2.695.272.273 2.69.073 7.052.014 8.333 0 8.741 0 12c0 3.259.014 3.668.072 4.948.2 4.358 2.618 6.78 6.98 6.98C8.333 23.986 8.741 24 12 24c3.259 0 3.668-.014 4.948-.072 4.354-.2 6.782-2.618 6.979-6.98.059-1.28.073-1.689.073-4.948 0-3.259-.014-3.667-.072-4.947-.196-4.354-2.617-6.78-6.979-6.98C15.668.014 15.259 0 12 0zm0 5.838a6.162 6.162 0 100 12.324 6.162 6.162 0 000-12.324zM12 16a4 4 0 110-8 4 4 0 010 8zm6.406-11.845a1.44 1.44 0 100 2.881 1.44 1.44 0 000-2.881z"/>
                                </svg>
                            </span>
                            <span class="text-zinc-700">cafe_calling_</span>
                        </a>
                    </div>
                    <div class="border-b border-stone-200 mt-3"></div>
                </div>

                <!-- 중단: 주소 + 스마트스토어 -->
                <div class="space-y-2.5 text-xs sm:text-sm text-zinc-700 font-medium z-10">
                    <!-- Address (텍스트) -->
                    <div class="flex items-center gap-2.5">
                        <div class="w-6 h-6 rounded-full bg-stone-100 flex items-center justify-center text-stone-500 shrink-0">
                            <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z"></path>
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 11a3 3 0 11-6 0 3 3 0 016 0z"></path>
                            </svg>
                        </div>
                        <span class="leading-snug">
                            청주시 청원구 율봉로212번길 53<br>
                            <span class="text-stone-500">더콜링 카페</span>
                        </span>
                    </div>

                    <!-- Store Link -->
                    <div class="flex items-center gap-2.5 w-full overflow-hidden">
                        <div class="w-6 h-6 rounded-full bg-stone-100 flex items-center justify-center text-stone-500 shrink-0">
                            <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                                <path d="M3 9l1.5-5h15L21 9"/>
                                <path d="M4 9v11h16V9"/>
                                <path d="M9 20v-6h6v6"/>
                            </svg>
                        </div>
                        <a href="https://smartstore.naver.com/thecalling" rel="noopener noreferrer" data-extlink class="hover:text-stone-900 transition-colors truncate block relative z-20" style="touch-action: manipulation;">
                            smartstore.naver.com/thecalling
                        </a>
                    </div>
                </div>

            </div>
        </div>

        <!-- 안내 문구 -->
        <div class="absolute -bottom-12 left-0 right-0 text-center text-stone-500 text-sm animate-pulse pointer-events-none">
            👆 명함을 클릭하여 뒤집어보세요
        </div>
    </div>

    <script>
        function toggleCard(e) {
            if (e && e.target && e.target.closest && e.target.closest('a')) return;
            document.getElementById('cardInner').classList.toggle('rotate-y-180');
        }

        // 외부 링크: 카드 뒤집기 핸들러와 충돌 없이 강제로 네비게이션
        document.querySelectorAll('a[data-extlink]').forEach(function(a) {
            a.addEventListener('click', function(e) {
                e.stopPropagation();
                if (a.href.startsWith('tel:')) return; // 전화는 기본 동작 유지
                e.preventDefault();
                window.location.href = a.href;
            });
        });
    </script>

</body>
</html>
